apiVersion: batch/v1
kind: CronJob
metadata:
  name: marketplace-metering
  namespace: costq-fastapi
spec:
  schedule: "5 * * * *"   # 每小时第 5 分钟执行（避开整点高峰）
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: costq-fastapi-sa
          restartPolicy: Never
          containers:
            - name: metering-job
              image: 000451883532.dkr.ecr.ap-northeast-1.amazonaws.com/costq-fastapi:app-codex-marketplace-cfn-minimal-8d60ed6
              command: ["python3", "-m", "backend.jobs.marketplace_metering_job"]
              envFrom:
                - configMapRef:
                    name: costq-fastapi-config
                - secretRef:
                    name: costq-fastapi-secret
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
